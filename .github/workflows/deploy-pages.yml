name: Demoyu GitHub Pages'e yayınla

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Pages'e yayın için gereken izinler
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda tek yayın çalışsın; devam eden yayın iptal edilmesin
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: UI5 build
        run: npm run build

      - name: Jekyll işlemesini kapat
        run: touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
